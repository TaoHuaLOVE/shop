name: Deploy to Netlify
on:
  push:
    branches: [master]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          UPSTREAM_API_URL: ${{ secrets.UPSTREAM_API_URL }}
          UPSTREAM_UID: ${{ secrets.UPSTREAM_UID }}
          UPSTREAM_KEY: ${{ secrets.UPSTREAM_KEY }}
          CODEPAY_ID: ${{ secrets.CODEPAY_ID }}
          CODEPAY_TOKEN: ${{ secrets.CODEPAY_TOKEN }}
          CODEPAY_API_URL: ${{ secrets.CODEPAY_API_URL }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: .next
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
